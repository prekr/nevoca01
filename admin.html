<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NE VOCA - 관리자 센터</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            overflow: hidden;
            /* 사이드바 내비게이션 형태이므로 내부 스크롤 사용 */
        }

        #teacherMode {
            position: relative;
            /* 새 창이므로 fixed일 필요 없음 */
            display: block !important;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="teacherMode">
        <!-- 학생 추가 모달 레이어 (내부에 위치시켜 확실한 렌더링 보장) -->
        <div id="addStudentModal" class="modal-overlay" style="display: none; z-index: 9999;">
            <div class="modal-content" style="max-width: 500px;">
                <div class="modal-header">
                    <h3>학생 추가하기</h3>
                    <button class="modal-close" onclick="window.closeAddStudentModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <p>현재 반에 소속되지 않은 학생 목록입니다.<br>추가할 학생을 선택해 주세요.</p>
                    <div class="student-selection-list" style="margin-top: 1rem;">
                        <label class="student-item-checkbox">
                            <input type="checkbox"> <span>김철수 (ID: chulsoo01)</span>
                        </label>
                        <label class="student-item-checkbox">
                            <input type="checkbox"> <span>이영희 (ID: younghee_v)</span>
                        </label>
                        <label class="student-item-checkbox">
                            <input type="checkbox"> <span>박지민 (ID: jimin_p)</span>
                        </label>
                        <label class="student-item-checkbox">
                            <input type="checkbox"> <span>최동건 (ID: dg_choi)</span>
                        </label>
                        <label class="student-item-checkbox">
                            <input type="checkbox"> <span>정채연 (ID: chaeyeon)</span>
                        </label>
                        <label class="student-item-checkbox">
                            <input type="checkbox"> <span>강하늘 (ID: sky_kang)</span>
                        </label>
                        <label class="student-item-checkbox">
                            <input type="checkbox"> <span>황희찬 (ID: h_chan)</span>
                        </label>
                        <label class="student-item-checkbox">
                            <input type="checkbox"> <span>조규성 (ID: guesung_cho)</span>
                        </label>
                    </div>
                    <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                        <button class="cancel-btn" style="padding: 0.8rem; margin: 0;"
                            onclick="window.closeAddStudentModal()">취소</button>
                        <button class="submit-btn" style="padding: 0.8rem; margin: 0;"
                            onclick="window.addSelectedStudents()">학생 추가 완료</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="teacher-dashboard">
            <aside class="teacher-sidebar">
                <div class="sidebar-logo">NE VOCA <span>For Teacher</span></div>
                <nav class="sidebar-menu">
                    <button class="menu-item active" data-view="class">
                        <span class="menu-icon">🏢</span>
                        <span>내 반 관리</span>
                    </button>
                    <button class="menu-item" data-view="students">
                        <span class="menu-icon">👨‍🎓</span>
                        <span>내 학생 관리</span>
                    </button>
                    <button class="menu-item" data-view="assignments">
                        <span class="menu-icon">✍️</span>
                        <span>과제 만들기</span>
                    </button>
                    <button class="menu-item" data-view="manageAssignments">
                        <span class="menu-icon">📋</span>
                        <span>과제 관리</span>
                    </button>
                    <button class="menu-item" data-view="results">
                        <span class="menu-icon">📊</span>
                        <span>과제 수행결과</span>
                    </button>
                </nav>
            </aside>
            <main class="teacher-main">

                    <h2 id="teacherViewTitle">내 반 관리</h2>

                        <div class="teacher-code-badge">
                            <span class="code-label">선생님 코드:</span>
                            <span class="code-value" id="teacherCodeDisplay">------</span>
                            <button class="copy-code-btn" onclick="copyTeacherCode()" title="코드 복사">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </header>
                <div class="teacher-content-area" id="teacherContent">
                    <!-- Content will be rendered here via JS -->
                </div>
            </main>
        </div>
    </div>

        // 선생님 코드 만들기 및 관리 (localStorage를 사용하여 고정)
        function generateTeacherCode() {
            let code = localStorage.getItem('teacherCode');

            if (!code) {
                // 코드가 없으면 새로 만들기 (100,000 ~ 999,999)
                code = Math.floor(100000 + Math.random() * 900000);
                localStorage.setItem('teacherCode', code);
            }

            document.getElementById('teacherCodeDisplay').textContent = code;
            return code;
        }

        function copyTeacherCode() {
            const code = document.getElementById('teacherCodeDisplay').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('선생님 코드가 복사되었습니다: ' + code);
            }).catch(err => {
                console.error('복사 실패:', err);
            });
        }

        // 학습 범위(Day) 조절 함수
        function adjustDay(inputId, delta) {
            const input = document.getElementById(inputId);
            if (!input) return;
            let currentValue = parseInt(input.value) || 0;
            let newValue = currentValue + delta;
            if (newValue < 1) newValue = 1; // 최소값 1 유지
            input.value = newValue;
        }

        // 과제 배포 및 유효성 검사
        function submitAssignment() {
            const startInput = document.getElementById('assignmentDayStart');
            const endInput = document.getElementById('assignmentDayEnd');

            if (!startInput || !endInput) return;

            const dayStart = parseInt(startInput.value);
            const dayEnd = parseInt(endInput.value);

            if (dayEnd < dayStart) {
                alert('학습 범위의 종료일(Day)은 시작일보다 작을 수 없습니다.');
                endInput.focus();
                return;
            }

            alert('과제가 성공적으로 배포되었습니다!');
            showTeacherView('manageAssignments');
        }

        window.addEventListener('load', () => {
            generateTeacherCode();
            showTeacherView('class');
        });

            console.log("Opening student selection modal...");
